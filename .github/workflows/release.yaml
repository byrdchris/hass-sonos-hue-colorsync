name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          mkdir -p dist
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="dist" \
            -czf "dist/sonos_hue_sync_${GITHUB_REF_NAME}.tar.gz" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sonos_hue_sync_${{ github.ref_name }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}