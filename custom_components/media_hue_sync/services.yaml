enable:
  name: Enable
  description: Enable Sonos Hue Sync control.
disable:
  name: Disable
  description: Disable Sonos Hue Sync control and restore the prior scene.
apply_last_palette:
  name: Apply last palette
  description: Apply the last extracted palette immediately to the selected lights.
extract_now:
  name: Extract now
  description: Force palette extraction from the currently selected Sonos entity.
test_rainbow:
  name: Test rainbow
  description: Apply a built-in rainbow palette immediately to the selected lights.
test_color:
  name: Test color
  description: Apply a single RGB color immediately to the selected lights.
  fields:
    r:
      required: true
      example: 255
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: box
    g:
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: box
    b:
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: box

show_help:
  name: Show help
  description: Show a Sonos Hue Sync quick guide, including where to download diagnostics, as a Home Assistant notification.

health_check:
  name: Health check
  description: Run a Sonos Hue Sync health check and show the result as a Home Assistant notification.
