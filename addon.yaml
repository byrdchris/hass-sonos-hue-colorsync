name: Sonos Color Sync
description: Extracts dominant colors from Sonos album art and syncs them to Philips Hue lights
version: 1.0.0
slug: sonos-color-sync
codenotary: unsigned
init: false
arch:
  - amd64
  - armv7
  - arm64
startup: services
boot: auto
options:
  sonos_entity_id: media_player.sonos
  hue_bridge_ip: ""
  hue_app_key: ""
  poll_interval: 5
  color_count: 3
  transition_time: 2
  filter_dull_colors: true
  cache_enabled: true
schema:
  sonos_entity_id:
    type: string
    description: "Select your Sonos media player entity from Home Assistant"
    default: "media_player.sonos"
  hue_bridge_ip:
    type: string
    description: "IP address of your Philips Hue Bridge (e.g., 192.168.1.100)"
    placeholder: "192.168.1.100"
  hue_app_key:
    type: string
    description: "Hue Bridge app key (leave empty to start pairing)"
    placeholder: "Leave empty to pair"
  poll_interval:
    type: integer
    description: "How often to check for song changes (seconds)"
    default: 5
    minimum: 1
    maximum: 60
  color_count:
    type: integer
    description: "Number of dominant colors to extract"
    default: 3
    minimum: 1
    maximum: 10
  transition_time:
    type: integer
    description: "Smooth fade transition time (seconds)"
    default: 2
    minimum: 0
    maximum: 10
  filter_dull_colors:
    type: boolean
    description: "Filter out near-black and near-white colors"
    default: true
  cache_enabled:
    type: boolean
    description: "Cache album art to reduce network requests"
    default: true
  hue_light_group:
    type: string
    description: "Name of the Hue light group to sync (leave empty to select all)"
    placeholder: "Living Room"
services:
  sonos_color_sync:
    description: Main color sync service
    publish:
      - port: 8080
        protocol: http
